<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chterm Console</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1b26; color: #c0caf5; height: 100vh; display: flex; flex-direction: column;
}
/* Header */
.header {
  display: flex; align-items: center; padding: 8px 16px;
  background: #24283b; border-bottom: 1px solid #3b4261;
}
.header h1 { font-size: 14px; font-weight: 600; color: #7aa2f7; margin-right: 16px; }
.header .status { font-size: 12px; color: #565f89; }
.header .status.connected { color: #9ece6a; }
.btn {
  padding: 6px 14px; border: 1px solid #3b4261; border-radius: 4px;
  background: #24283b; color: #c0caf5; cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
.btn:hover { background: #3b4261; }
.btn.primary { background: #7aa2f7; color: #1a1b26; border-color: #7aa2f7; }
.btn.primary:hover { background: #89b4fa; }
.btn.set { background: #9ece6a; color: #1a1b26; border-color: #9ece6a; }
.spacer { flex: 1; }

/* Terminal */
.term-container {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
#termOutput {
  flex: 1; padding: 4px;
}
.xterm { height: 100% !important; }

/* Context Menu */
.ctx-menu {
  display: none; position: fixed; z-index: 2000;
  background: #24283b; border: 1px solid #3b4261; border-radius: 6px;
  padding: 4px 0; min-width: 180px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.ctx-menu.open { display: block; }
.ctx-menu-item {
  padding: 7px 16px; font-size: 13px; color: #c0caf5; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
}
.ctx-menu-item:hover { background: #3b4261; }
.ctx-menu-item .shortcut { margin-left: auto; color: #565f89; font-size: 11px; }
.ctx-menu-sep { height: 1px; background: #3b4261; margin: 4px 0; }

/* File Browser Modal */
.fb-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 1500; align-items: center; justify-content: center;
}
.fb-overlay.open { display: flex; }
.fb {
  background: #1a1b26; border: 1px solid #3b4261; border-radius: 8px;
  width: 520px; max-height: 70vh; display: flex; flex-direction: column;
}
.fb-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-bottom: 1px solid #3b4261; background: #24283b; border-radius: 8px 8px 0 0;
}
.fb-header .fb-title { font-size: 13px; font-weight: 600; color: #7aa2f7; }
.fb-header .spacer { flex: 1; }
.fb-path {
  flex: 1; padding: 5px 10px; border: 1px solid #3b4261; border-radius: 4px;
  background: #1a1b26; color: #c0caf5; font-size: 13px; font-family: monospace; outline: none;
}
.fb-path:focus { border-color: #7aa2f7; }
.fb-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.fb-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 14px;
  cursor: pointer; font-size: 13px; color: #c0caf5;
}
.fb-item:hover { background: #24283b; }
.fb-item.selected { background: #3b4261; }
.fb-item .icon { width: 18px; text-align: center; }
.fb-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fb-item .size { color: #565f89; font-size: 12px; font-family: monospace; }
.fb-item.dir .name { color: #7aa2f7; }
.fb-footer {
  display: flex; gap: 8px; padding: 10px 14px;
  border-top: 1px solid #3b4261; justify-content: flex-end;
}
.fb-empty { padding: 20px; text-align: center; color: #565f89; font-size: 13px; }

/* Password Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #24283b; border: 1px solid #3b4261; border-radius: 8px;
  padding: 24px; width: 360px;
}
.modal h2 { font-size: 16px; margin-bottom: 8px; color: #c0caf5; }
.modal p { font-size: 13px; color: #565f89; margin-bottom: 16px; }
.modal input {
  width: 100%; padding: 8px 12px; border: 1px solid #3b4261; border-radius: 4px;
  background: #1a1b26; color: #c0caf5; font-size: 14px; outline: none;
}
.modal input:focus { border-color: #7aa2f7; }
.modal .error { color: #f7768e; font-size: 12px; margin-top: 8px; display: none; }
.modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="header">
  <h1>Chterm</h1>
  <span id="status" class="status">Not connected</span>
  <div class="spacer"></div>
  <button id="uploadBtn" class="btn" onclick="uploadFile()" style="display:none">Upload</button>
  <button id="downloadBtn" class="btn" onclick="downloadFile()" style="display:none">Download</button>
  <button id="execKeyBtn" class="btn primary" onclick="generateExecKey()">Exec Key</button>
  <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
</div>

<div class="term-container">
  <div id="termOutput"></div>
</div>

<!-- File Browser Modal -->
<div id="fbOverlay" class="fb-overlay">
  <div class="fb">
    <div class="fb-header">
      <span class="fb-title" id="fbTitle">Browse</span>
      <div class="spacer"></div>
      <button class="btn" onclick="fbUp()" title="Parent directory">Up</button>
    </div>
    <div style="padding:6px 14px;">
      <input class="fb-path" id="fbPathInput" placeholder="/tmp" spellcheck="false">
    </div>
    <div class="fb-list" id="fbList"></div>
    <div class="fb-footer">
      <button class="btn" onclick="closeFb()">Cancel</button>
      <button class="btn" id="fbUploadBtn" style="display:none" onclick="fbUploadHere()">Upload Here</button>
      <button class="btn primary" id="fbSelectBtn" onclick="fbSelect()">Select</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div id="ctxMenu" class="ctx-menu">
  <div class="ctx-menu-item" onclick="ctxCopy()">Copy<span class="shortcut">Ctrl+Shift+C</span></div>
  <div class="ctx-menu-item" onclick="ctxPaste()">Paste<span class="shortcut">Ctrl+Shift+V</span></div>
  <div class="ctx-menu-sep"></div>
  <div class="ctx-menu-item" onclick="ctxClear()">Clear</div>
  <div class="ctx-menu-sep"></div>
  <div class="ctx-menu-item" onclick="uploadFile()">Upload File...</div>
  <div class="ctx-menu-item" onclick="downloadFile()">Download File...</div>
</div>

<!-- Password Modal -->
<div id="pwModal" class="modal-overlay">
  <div class="modal">
    <h2 id="pwTitle">Set Password</h2>
    <p id="pwDesc">Enter password to generate exec key.</p>
    <input id="pwInput" type="password" placeholder="Password" autocomplete="off">
    <div id="pwErr" class="error"></div>
    <div class="actions">
      <button class="btn" onclick="closePwModal()">Cancel</button>
      <button class="btn primary" onclick="submitPw()">OK</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
// Derive API base from current page URL (e.g. /chterm/ → /chterm)
const API = window.location.pathname.replace(/\/+$/, '') || '';
let currentExecKey = null;
let pwResolve = null;

// ── Password Modal ──
function openPwModal(title, desc) {
  return new Promise(resolve => {
    pwResolve = resolve;
    document.getElementById('pwTitle').textContent = title;
    document.getElementById('pwDesc').textContent = desc;
    document.getElementById('pwInput').value = '';
    document.getElementById('pwErr').style.display = 'none';
    document.getElementById('pwModal').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  });
}
function closePwModal() {
  document.getElementById('pwModal').classList.remove('open');
  if (pwResolve) { pwResolve(null); pwResolve = null; }
}
function submitPw() {
  const pw = document.getElementById('pwInput').value;
  document.getElementById('pwModal').classList.remove('open');
  if (pwResolve) { pwResolve(pw); pwResolve = null; }
}
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPw();
  if (e.key === 'Escape') closePwModal();
});

// ── Exec Key ──
function markExecKeySet(key) {
  if (key) currentExecKey = key;
  const btn = document.getElementById('execKeyBtn');
  btn.classList.add('set');
  btn.textContent = 'Key Set ✓';
  document.getElementById('status').textContent = 'Connected';
  document.getElementById('status').classList.add('connected');
  document.getElementById('uploadBtn').style.display = '';
  document.getElementById('downloadBtn').style.display = '';
  // Auto-init terminal
  if (!xterm) initXterm();
  if (!termSessionInited) initTermSession();
  startTermPoll();
}

async function checkExecKey() {
  try {
    const res = await fetch(`${API}/api/exec-key`);
    const d = await res.json();
    if (d.set) {
      // Key was set before, need password to unlock
      document.getElementById('execKeyBtn').classList.add('set');
      document.getElementById('execKeyBtn').textContent = 'Unlock Key';
    }
  } catch(e) {}
}

async function generateExecKey() {
  const btn = document.getElementById('execKeyBtn');
  const isSet = btn.classList.contains('set') && !currentExecKey;
  const pw = await openPwModal(
    isSet ? 'Unlock Exec Key' : 'Set Exec Key Password',
    isSet ? 'Enter password to unlock.' : 'Choose a password to protect the exec key.'
  );
  if (!pw) return;
  try {
    const res = await fetch(`${API}/api/exec-key`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const d = await res.json();
    if (d.key) markExecKeySet(d.key);
    else if (d.error) {
      const retry = await openPwModal('Unlock Exec Key', d.error + ' Try again.');
      if (retry) {
        const res2 = await fetch(`${API}/api/exec-key`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: retry })
        });
        const d2 = await res2.json();
        if (d2.key) markExecKeySet(d2.key);
      }
    }
  } catch(e) {}
}
checkExecKey();

// ── xterm.js Terminal ──
let xterm = null;
let xtermFit = null;
let termPollTimer = null;
let termSessionInited = false;

function initXterm() {
  if (xterm) return;
  xterm = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace",
    theme: {
      background: '#1a1b26',
      foreground: '#c0caf5',
      cursor: '#c0caf5',
      selectionBackground: 'rgba(255,255,255,0.2)',
      black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
      blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
    },
    scrollback: 10000,
  });
  xtermFit = new FitAddon.FitAddon();
  xterm.loadAddon(xtermFit);
  xterm.open(document.getElementById('termOutput'));
  xtermFit.fit();

  // Let Ctrl + key combos pass through to the terminal (bash keybindings)
  // instead of being handled by the browser (e.g. Ctrl-A = select all)
  xterm.attachCustomKeyEventHandler(e => {
    if (e.type !== 'keydown') return true;
    // Ctrl + letter keys: let xterm handle them (bash: Ctrl-A/E/K/U/W/C/D/L/R etc.)
    if (e.ctrlKey && !e.altKey && !e.metaKey && e.key.length === 1) {
      return true; // xterm handles it
    }
    // Allow Ctrl-Shift-C/V for copy/paste in browser
    if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'V')) {
      return false; // browser handles it
    }
    return true;
  });

  xterm.onData(data => {
    if (!currentExecKey) return;
    fetch(`${API}/api/term/input`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd: data, key: currentExecKey })
    }).catch(() => {});
  });

  xterm.onResize(({ cols, rows }) => {
    if (!currentExecKey) return;
    fetch(`${API}/api/term/resize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cols, rows })
    }).catch(() => {});
  });

  xterm.focus();
}

function startTermPoll() {
  if (termPollTimer) return;
  termPollTimer = setInterval(pollTermOutput, 100);
}
function stopTermPoll() {
  if (termPollTimer) { clearInterval(termPollTimer); termPollTimer = null; }
}

async function initTermSession() {
  if (termSessionInited || !currentExecKey) return;
  termSessionInited = true;
  try {
    await fetch(`${API}/api/term/input`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd: '', key: currentExecKey })
    });
    startTermPoll();
    setTimeout(() => {
      if (xterm && xtermFit) {
        xtermFit.fit();
        fetch(`${API}/api/term/resize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cols: xterm.cols, rows: xterm.rows })
        }).catch(() => {});
      }
    }, 200);
  } catch(e) {}
}

async function pollTermOutput() {
  if (!currentExecKey) return;
  try {
    const res = await fetch(`${API}/api/term/read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: currentExecKey })
    });
    const data = await res.json();
    if (data.error) return;
    if (data.output && xterm) xterm.write(data.output);
  } catch(e) {}
}

// ── Context Menu ──
const ctxMenu = document.getElementById('ctxMenu');

document.getElementById('termOutput').addEventListener('contextmenu', e => {
  if (!currentExecKey) return;
  e.preventDefault();
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top = e.clientY + 'px';
  ctxMenu.classList.add('open');
});

document.addEventListener('click', () => ctxMenu.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') ctxMenu.classList.remove('open'); });

function ctxCopy() {
  ctxMenu.classList.remove('open');
  if (xterm && xterm.hasSelection()) {
    navigator.clipboard.writeText(xterm.getSelection());
    if (xterm) xterm.write('\r\n\x1b[90mCopied to clipboard\x1b[0m\r\n');
  }
}

async function ctxPaste() {
  ctxMenu.classList.remove('open');
  try {
    const text = await navigator.clipboard.readText();
    if (text && currentExecKey) {
      fetch(`${API}/api/term/input`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cmd: text, key: currentExecKey })
      }).catch(() => {});
    }
  } catch(e) {}
}

function ctxClear() {
  ctxMenu.classList.remove('open');
  if (xterm) xterm.clear();
}

// ── File Browser ──
let fbMode = ''; // 'download' or 'upload'
let fbCurrentPath = '/tmp';
let fbSelectedFile = null;
let fbResolve = null;

function openFileBrowser(mode) {
  fbMode = mode;
  fbSelectedFile = null;
  document.getElementById('fbTitle').textContent = mode === 'upload' ? 'Upload To...' : 'Download File';
  document.getElementById('fbUploadBtn').style.display = mode === 'upload' ? '' : 'none';
  document.getElementById('fbSelectBtn').textContent = mode === 'download' ? 'Download' : 'Select';
  document.getElementById('fbOverlay').classList.add('open');
  fbNavigate(fbCurrentPath);
}

function closeFb() {
  document.getElementById('fbOverlay').classList.remove('open');
  if (fbResolve) { fbResolve(null); fbResolve = null; }
}

async function fbNavigate(path) {
  fbCurrentPath = path;
  document.getElementById('fbPathInput').value = path;
  fbSelectedFile = null;
  const list = document.getElementById('fbList');
  list.innerHTML = '<div class="fb-empty">Loading...</div>';
  try {
    const res = await fetch(`${API}/api/file/list`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, key: currentExecKey })
    });
    const d = await res.json();
    if (d.error) { list.innerHTML = `<div class="fb-empty">${d.error}</div>`; return; }
    fbCurrentPath = d.path;
    document.getElementById('fbPathInput').value = d.path;
    if (!d.files || d.files.length === 0) {
      list.innerHTML = '<div class="fb-empty">Empty directory</div>';
      return;
    }
    list.innerHTML = '';
    for (const f of d.files) {
      const item = document.createElement('div');
      item.className = 'fb-item' + (f.dir ? ' dir' : '');
      const sizeStr = f.dir ? '' : formatSize(f.size);
      item.innerHTML = `<span class="icon">${f.dir ? '&#128193;' : '&#128196;'}</span><span class="name">${esc(f.name)}</span><span class="size">${sizeStr}</span>`;
      if (f.dir) {
        item.addEventListener('dblclick', () => fbNavigate(fbCurrentPath + '/' + f.name));
        item.addEventListener('click', () => {
          list.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          fbSelectedFile = { name: f.name, dir: true };
        });
      } else {
        item.addEventListener('click', () => {
          list.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          fbSelectedFile = { name: f.name, dir: false };
        });
        item.addEventListener('dblclick', () => { fbSelectedFile = { name: f.name, dir: false }; fbSelect(); });
      }
      list.appendChild(item);
    }
  } catch(e) { list.innerHTML = `<div class="fb-empty">Error: ${e.message}</div>`; }
}

function fbUp() {
  const parts = fbCurrentPath.split('/').filter(Boolean);
  if (parts.length > 0) parts.pop();
  fbNavigate('/' + parts.join('/'));
}

document.getElementById('fbPathInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fbNavigate(e.target.value);
});

function fbSelect() {
  if (fbMode === 'download' && fbSelectedFile && !fbSelectedFile.dir) {
    const path = fbCurrentPath + '/' + fbSelectedFile.name;
    closeFb();
    doDownload(path);
  } else if (fbMode === 'download' && fbSelectedFile && fbSelectedFile.dir) {
    fbNavigate(fbCurrentPath + '/' + fbSelectedFile.name);
  } else if (fbMode === 'upload') {
    closeFb();
    pendingUploadPath = fbCurrentPath + '/';
    document.getElementById('fileInput').click();
  }
}

function fbUploadHere() {
  closeFb();
  pendingUploadPath = fbCurrentPath + '/';
  document.getElementById('fileInput').click();
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024/1024/1024).toFixed(1) + ' GB';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── File Upload / Download ──
let pendingUploadPath = '';

function uploadFile() {
  ctxMenu.classList.remove('open');
  pendingUploadPath = '/tmp/';
  document.getElementById('fileInput').click();
}

const CHUNK_SIZE = 10 * 1024 * 1024; // 10MB

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file || !pendingUploadPath) return;
  let destPath = pendingUploadPath;
  if (destPath.endsWith('/')) destPath += file.name;
  event.target.value = '';

  try {
    if (xterm) xterm.write(`\r\n\x1b[33mUploading ${file.name} (${formatSize(file.size)})...\x1b[0m`);

    // Start session
    const startRes = await fetch(`${API}/api/file/upload-start`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: destPath, key: currentExecKey })
    });
    const startData = await startRes.json();
    if (startData.error) { if (xterm) xterm.write(`\r\n\x1b[31m${startData.error}\x1b[0m\r\n`); return; }
    const id = startData.id;

    // Send chunks
    let offset = 0;
    while (offset < file.size) {
      const slice = file.slice(offset, offset + CHUNK_SIZE);
      const base64 = await blobToBase64(slice);
      const chunkRes = await fetch(`${API}/api/file/upload-chunk`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, content: base64, key: currentExecKey })
      });
      const chunkData = await chunkRes.json();
      if (chunkData.error) { if (xterm) xterm.write(`\r\n\x1b[31m${chunkData.error}\x1b[0m\r\n`); return; }
      offset += CHUNK_SIZE;
      const pct = Math.min(100, Math.round(offset / file.size * 100));
      if (xterm) xterm.write(`\r\x1b[K\x1b[33mUploading ${file.name}... ${pct}% (${formatSize(Math.min(offset, file.size))}/${formatSize(file.size)})\x1b[0m`);
    }

    // Finish
    const endRes = await fetch(`${API}/api/file/upload-end`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, key: currentExecKey })
    });
    const endData = await endRes.json();
    if (endData.ok) {
      if (xterm) xterm.write(`\r\x1b[K\x1b[32mUploaded ${file.name} → ${endData.path} (${formatSize(endData.size)})\x1b[0m\r\n`);
    } else {
      if (xterm) xterm.write(`\r\n\x1b[31m${endData.error}\x1b[0m\r\n`);
    }
  } catch(e) {
    if (xterm) xterm.write(`\r\n\x1b[31mUpload failed: ${e.message}\x1b[0m\r\n`);
  }
  pendingUploadPath = '';
}

function blobToBase64(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

function downloadFile() {
  ctxMenu.classList.remove('open');
  openFileBrowser('download');
}

async function doDownload(path) {
  try {
    // Start session
    const startRes = await fetch(`${API}/api/file/download-start`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, key: currentExecKey })
    });
    const startData = await startRes.json();
    if (startData.error) { if (xterm) xterm.write(`\r\n\x1b[31m${startData.error}\x1b[0m\r\n`); return; }

    const { id, size, name } = startData;
    if (xterm) xterm.write(`\r\n\x1b[33mDownloading ${name} (${formatSize(size)})...\x1b[0m`);

    // Fetch chunks
    const chunks = [];
    let done = false;
    let downloaded = 0;
    while (!done) {
      const chunkRes = await fetch(`${API}/api/file/download-chunk`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, key: currentExecKey })
      });
      const chunkData = await chunkRes.json();
      if (chunkData.error) { if (xterm) xterm.write(`\r\n\x1b[31m${chunkData.error}\x1b[0m\r\n`); return; }
      if (chunkData.content) {
        const bytes = Uint8Array.from(atob(chunkData.content), c => c.charCodeAt(0));
        chunks.push(bytes);
        downloaded += bytes.length;
      }
      done = chunkData.done;
      const pct = size > 0 ? Math.round(downloaded / size * 100) : 100;
      if (xterm) xterm.write(`\r\x1b[K\x1b[33mDownloading ${name}... ${pct}% (${formatSize(downloaded)}/${formatSize(size)})\x1b[0m`);
    }

    // Combine and save
    const blob = new Blob(chunks);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
    URL.revokeObjectURL(url);
    if (xterm) xterm.write(`\r\x1b[K\x1b[32mDownloaded ${name} (${formatSize(downloaded)})\x1b[0m\r\n`);
  } catch(e) {
    if (xterm) xterm.write(`\r\n\x1b[31mDownload failed: ${e.message}\x1b[0m\r\n`);
  }
}

// Fit on window resize
window.addEventListener('resize', () => {
  if (xtermFit) xtermFit.fit();
});
</script>
</body>
